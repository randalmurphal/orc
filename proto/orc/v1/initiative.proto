syntax = "proto3";

package orc.v1;

import "google/protobuf/timestamp.proto";
import "orc/v1/common.proto";
import "orc/v1/task.proto";

option go_package = "github.com/randalmurphal/orc/gen/proto/orc/v1;orcv1";

// =============================================================================
// ENUMS
// =============================================================================

enum InitiativeStatus {
  INITIATIVE_STATUS_UNSPECIFIED = 0;
  INITIATIVE_STATUS_DRAFT = 1;
  INITIATIVE_STATUS_ACTIVE = 2;
  INITIATIVE_STATUS_COMPLETED = 3;
  INITIATIVE_STATUS_ARCHIVED = 4;
}

enum MergeStatus {
  MERGE_STATUS_UNSPECIFIED = 0;
  MERGE_STATUS_NONE = 1;
  MERGE_STATUS_PENDING = 2;
  MERGE_STATUS_IN_PROGRESS = 3;
  MERGE_STATUS_MERGED = 4;
  MERGE_STATUS_FAILED = 5;
}

// =============================================================================
// DOMAIN MESSAGES
// =============================================================================

message Identity {
  string initials = 1;
  optional string display_name = 2;
  optional string email = 3;
}

message InitiativeDecision {
  string id = 1;
  google.protobuf.Timestamp date = 2;
  string by = 3;
  string decision = 4;
  optional string rationale = 5;
}

message TaskRef {
  string id = 1;
  string title = 2;
  TaskStatus status = 3;
  repeated string depends_on = 4;
}

message Criterion {
  string id = 1;
  string description = 2;
  string status = 3;             // uncovered, covered, satisfied, regressed
  repeated string task_ids = 4;
  string verified_at = 5;
  string verified_by = 6;
  string evidence = 7;
}

message CoverageReport {
  int32 total = 1;
  int32 uncovered = 2;
  int32 covered = 3;
  int32 satisfied = 4;
  int32 regressed = 5;
  repeated Criterion criteria = 6;
}

message Initiative {
  int32 version = 1;
  string id = 2;
  string title = 3;
  InitiativeStatus status = 4;
  optional Identity owner = 5;
  optional string vision = 6;
  repeated InitiativeDecision decisions = 7;
  repeated string context_files = 8;
  repeated TaskRef tasks = 9;
  repeated string blocked_by = 10;
  optional string branch_base = 11;
  optional string branch_prefix = 12;
  MergeStatus merge_status = 13;
  optional string merge_commit = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  repeated Criterion criteria = 17;
  repeated string blocks = 100;
}

message InitiativeProgress {
  string id = 1;
  int32 completed = 2;
  int32 total = 3;
}

// InitiativeNote represents a note stored at the initiative level.
// Notes capture patterns, warnings, learnings, and handoffs for knowledge sharing.
message InitiativeNote {
  string id = 1;
  string initiative_id = 2;
  string author = 3;
  string author_type = 4;  // 'human' | 'agent'
  optional string source_task = 5;   // TASK-XXX if agent-generated
  optional string source_phase = 6;  // 'docs' if agent-generated
  string note_type = 7;    // 'pattern' | 'warning' | 'learning' | 'handoff'
  string content = 8;
  repeated string relevant_files = 9;
  bool graduated = 10;
  google.protobuf.Timestamp created_at = 11;
}

// =============================================================================
// SERVICE
// =============================================================================

service InitiativeService {
  rpc ListInitiatives(ListInitiativesRequest) returns (ListInitiativesResponse);
  rpc GetInitiative(GetInitiativeRequest) returns (GetInitiativeResponse);
  rpc CreateInitiative(CreateInitiativeRequest) returns (CreateInitiativeResponse);
  rpc UpdateInitiative(UpdateInitiativeRequest) returns (UpdateInitiativeResponse);
  rpc DeleteInitiative(DeleteInitiativeRequest) returns (DeleteInitiativeResponse);
  rpc ListInitiativeTasks(ListInitiativeTasksRequest) returns (ListInitiativeTasksResponse);
  rpc LinkTasks(LinkTasksRequest) returns (LinkTasksResponse);
  rpc UnlinkTask(UnlinkTaskRequest) returns (UnlinkTaskResponse);
  rpc AddDecision(AddDecisionRequest) returns (AddDecisionResponse);
  rpc GetReadyTasks(GetReadyTasksRequest) returns (GetReadyTasksResponse);
  rpc GetDependencyGraph(GetDependencyGraphRequest) returns (GetDependencyGraphResponse);
  rpc RunInitiative(RunInitiativeRequest) returns (RunInitiativeResponse);
  // Initiative Notes
  rpc ListInitiativeNotes(ListInitiativeNotesRequest) returns (ListInitiativeNotesResponse);
  rpc ListTaskGeneratedNotes(ListTaskGeneratedNotesRequest) returns (ListTaskGeneratedNotesResponse);
  // Initiative Criteria
  rpc AddCriterion(AddCriterionRequest) returns (AddCriterionResponse);
  rpc RemoveCriterion(RemoveCriterionRequest) returns (RemoveCriterionResponse);
  rpc MapCriterionToTask(MapCriterionToTaskRequest) returns (MapCriterionToTaskResponse);
  rpc VerifyCriterion(VerifyCriterionRequest) returns (VerifyCriterionResponse);
  rpc GetCoverageReport(GetCoverageReportRequest) returns (GetCoverageReportResponse);
}

// =============================================================================
// REQUEST/RESPONSE MESSAGES
// =============================================================================

message ListInitiativesRequest {
  string project_id = 1;  // Required: project to list initiatives from
  PageRequest page = 2;
  optional InitiativeStatus status = 3;
  bool shared = 4;
}

message ListInitiativesResponse {
  repeated Initiative initiatives = 1;
  PageResponse page = 2;
}

message GetInitiativeRequest {
  string project_id = 1;
  string initiative_id = 2;
}

message GetInitiativeResponse {
  Initiative initiative = 1;
}

message CreateInitiativeRequest {
  string project_id = 1;  // Required: project to create initiative in
  string title = 2;
  optional string vision = 3;
  optional Identity owner = 4;
  repeated string blocked_by = 5;
  optional string branch_base = 6;
  optional string branch_prefix = 7;
  repeated string context_files = 8;
}

message CreateInitiativeResponse {
  Initiative initiative = 1;
}

message UpdateInitiativeRequest {
  string project_id = 1;
  string initiative_id = 2;
  optional string title = 3;
  optional string vision = 4;
  optional Identity owner = 5;
  optional InitiativeStatus status = 6;
  repeated string blocked_by = 7;
  optional string branch_base = 8;
  optional string branch_prefix = 9;
  repeated string context_files = 10;
}

message UpdateInitiativeResponse {
  Initiative initiative = 1;
}

message DeleteInitiativeRequest {
  string project_id = 1;
  string initiative_id = 2;
}

message DeleteInitiativeResponse {
  string message = 1;
}

message ListInitiativeTasksRequest {
  string project_id = 1;
  string initiative_id = 2;
}

message ListInitiativeTasksResponse {
  repeated Task tasks = 1;
}

message LinkTasksRequest {
  string project_id = 1;
  string initiative_id = 2;
  repeated string task_ids = 3;
}

message LinkTasksResponse {
  Initiative initiative = 1;
}

message UnlinkTaskRequest {
  string project_id = 1;
  string initiative_id = 2;
  string task_id = 3;
}

message UnlinkTaskResponse {
  Initiative initiative = 1;
}

message AddDecisionRequest {
  string project_id = 1;
  string initiative_id = 2;
  string decision = 3;
  optional string rationale = 4;
  optional string by = 5;
}

message AddDecisionResponse {
  Initiative initiative = 1;
}

message GetReadyTasksRequest {
  string project_id = 1;
  string initiative_id = 2;
}

message GetReadyTasksResponse {
  repeated Task tasks = 1;
}

message GetDependencyGraphRequest {
  string project_id = 1;
  string initiative_id = 2;
}

message GetDependencyGraphResponse {
  DependencyGraph graph = 1;
}

message RunInitiativeRequest {
  string project_id = 1;
  string initiative_id = 2;
  optional string profile = 3;
  int32 max_parallel = 4;
}

message RunInitiativeResponse {
  Initiative initiative = 1;
  repeated string started_task_ids = 2;
  string message = 3;
}

// Initiative Notes - Request/Response messages
message ListInitiativeNotesRequest {
  string project_id = 1;
  string initiative_id = 2;
  optional string note_type = 3;  // Filter by type: 'pattern' | 'warning' | 'learning' | 'handoff'
}

message ListInitiativeNotesResponse {
  repeated InitiativeNote notes = 1;
}

message ListTaskGeneratedNotesRequest {
  string project_id = 1;
  string task_id = 2;  // Get notes generated by this task
}

message ListTaskGeneratedNotesResponse {
  repeated InitiativeNote notes = 1;
}

// Initiative Criteria - Request/Response messages
message AddCriterionRequest {
  string project_id = 1;
  string initiative_id = 2;
  string description = 3;
}

message AddCriterionResponse {
  Initiative initiative = 1;
}

message RemoveCriterionRequest {
  string project_id = 1;
  string initiative_id = 2;
  string criterion_id = 3;
}

message RemoveCriterionResponse {
  Initiative initiative = 1;
}

message MapCriterionToTaskRequest {
  string project_id = 1;
  string initiative_id = 2;
  string criterion_id = 3;
  string task_id = 4;
}

message MapCriterionToTaskResponse {
  Initiative initiative = 1;
}

message VerifyCriterionRequest {
  string project_id = 1;
  string initiative_id = 2;
  string criterion_id = 3;
  string status = 4;
  string evidence = 5;
}

message VerifyCriterionResponse {
  Initiative initiative = 1;
}

message GetCoverageReportRequest {
  string project_id = 1;
  string initiative_id = 2;
}

message GetCoverageReportResponse {
  CoverageReport report = 1;
}
