syntax = "proto3";

package orc.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/randalmurphal/orc/gen/proto/orc/v1;orcv1";

// =============================================================================
// DOMAIN MESSAGES
// =============================================================================

// Thread represents a conversation thread.
message Thread {
  string id = 1;
  string title = 2;
  string status = 3;
  string task_id = 4;
  string initiative_id = 5;
  string session_id = 6;
  string file_context = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  repeated ThreadMessage messages = 10;
}

// ThreadMessage represents a single message within a thread.
message ThreadMessage {
  int64 id = 1;
  string thread_id = 2;
  string role = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
}

// =============================================================================
// SERVICE
// =============================================================================

service ThreadService {
  // Create a new conversation thread.
  rpc CreateThread(CreateThreadRequest) returns (CreateThreadResponse);

  // Get a thread with all its messages.
  rpc GetThread(GetThreadRequest) returns (GetThreadResponse);

  // List threads with optional filters.
  rpc ListThreads(ListThreadsRequest) returns (ListThreadsResponse);

  // Send a message and get an assistant response.
  rpc SendMessage(SendThreadMessageRequest) returns (SendThreadMessageResponse);

  // Archive a thread (set status to "archived").
  rpc ArchiveThread(ArchiveThreadRequest) returns (ArchiveThreadResponse);

  // Delete a thread and all its messages.
  rpc DeleteThread(DeleteThreadRequest) returns (DeleteThreadResponse);

  // Record a decision from a thread discussion to its linked initiative.
  rpc RecordDecision(RecordThreadDecisionRequest) returns (RecordThreadDecisionResponse);
}

// =============================================================================
// REQUEST/RESPONSE MESSAGES
// =============================================================================

// CreateThread
message CreateThreadRequest {
  string project_id = 1;
  string title = 2;
  optional string task_id = 3;
  optional string initiative_id = 4;
  optional string file_context = 5;
}

message CreateThreadResponse {
  Thread thread = 1;
}

// GetThread
message GetThreadRequest {
  string project_id = 1;
  string thread_id = 2;
}

message GetThreadResponse {
  Thread thread = 1;
}

// ListThreads
message ListThreadsRequest {
  string project_id = 1;
  string status = 2;
  string task_id = 3;
}

message ListThreadsResponse {
  repeated Thread threads = 1;
}

// SendMessage
message SendThreadMessageRequest {
  string project_id = 1;
  string thread_id = 2;
  string content = 3;
}

message SendThreadMessageResponse {
  ThreadMessage user_message = 1;
  ThreadMessage assistant_message = 2;
}

// ArchiveThread
message ArchiveThreadRequest {
  string project_id = 1;
  string thread_id = 2;
}

message ArchiveThreadResponse {
  Thread thread = 1;
}

// DeleteThread
message DeleteThreadRequest {
  string project_id = 1;
  string thread_id = 2;
}

message DeleteThreadResponse {}

// RecordDecision
message RecordThreadDecisionRequest {
  string project_id = 1;
  string thread_id = 2;
  string decision = 3;
  string rationale = 4;
}

message RecordThreadDecisionResponse {
  string decision_id = 1;
}
