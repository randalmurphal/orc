    description: |
      Design doc: docs/plans/2026-02-05-development-os-design.md
      Section: "Component 3: Planning Agent" → "Replanning Trigger"

      Add an on_task_completed trigger that checks whether a completed task's
      findings invalidate assumptions in remaining initiative tasks.

      **Trigger definition:**
      - Event: on_task_completed
      - Mode: reaction (non-blocking, informational)
      - Agent: planning-validator (new built-in agent)

      **What the agent checks:**
      - Load completed task's review findings and retry context
      - Load remaining tasks in the same initiative
      - Check if findings mention files or systems that remaining tasks
        plan to modify
      - If conflict detected: create a notification/event that the
        orchestrator or user can act on

      **Implementation:**
      - New agent definition in templates/agents/planning-validator.md
      - Trigger wired into the initiative's default workflow triggers
      - Uses existing trigger.Runner infrastructure

      **Output:**
      - Event published: "initiative_replan_suggested"
      - Includes: which findings, which tasks affected, recommended action
      - Orchestrator picks this up in its next assess cycle

