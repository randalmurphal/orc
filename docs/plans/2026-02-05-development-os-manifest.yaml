  - id: 13
    title: "Thread backend: conversation storage and API"
    weight: medium
    workflow: implement-medium
    category: feature
    priority: normal
    description: |
      Design doc: docs/plans/2026-02-05-development-os-design.md
      Section: "Component 6: Web UI" → "Thread Model" and "Resolved Design Decisions" → #4

      Backend infrastructure for persistent conversation threads.

      **Database schema (ProjectDB migration):**
      ```sql
      CREATE TABLE threads (
          id TEXT PRIMARY KEY,
          title TEXT NOT NULL,
          task_id TEXT,
          initiative_id TEXT,
          file_context TEXT,   -- JSON array of file paths
          status TEXT DEFAULT 'active',  -- active, idle, archived
          created_by TEXT,
          created_at TEXT,
          updated_at TEXT
      );

      CREATE TABLE thread_messages (
          id TEXT PRIMARY KEY,
          thread_id TEXT NOT NULL REFERENCES threads(id),
          role TEXT NOT NULL,  -- user, assistant
          content TEXT NOT NULL,
          created_at TEXT
      );
      ```

      **API service (internal/api/thread_server.go):**
      - CreateThread(title, task_id?, initiative_id?, file_context?)
      - GetThread(thread_id) — includes messages
      - ListThreads(project_id, status?, task_id?)
      - SendMessage(thread_id, content) — invokes Claude Code CLI,
        streams response via WebSocket
      - RecordDecision(thread_id, decision_text, rationale) — writes to
        initiative_decisions table + indexes into knowledge graph
      - ArchiveThread(thread_id)
      - DeleteThread(thread_id)

      **Claude Code integration:**
      - SendMessage invokes Claude Code CLI via ClaudeExecutor
      - System prompt built from: thread context (task/initiative),
        knowledge graph query results (deterministic injection),
        thread conversation history
      - Streaming responses pushed to client via WebSocket events
      - Session persistence: thread maps to a Claude Code session ID
        for multi-turn conversation continuity

      **WebSocket events:**
      - thread_message: new message in a thread
      - thread_status: thread status change
      - thread_typing: Claude is generating a response

