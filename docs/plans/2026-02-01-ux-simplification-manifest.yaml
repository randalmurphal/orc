      │  ┌──────────────────────────────────────┐  ┌──────────────────────────┐│
      │  │ TASK-042 Fix auth bug                │  │ TASK-045 Add caching    ││
      │  │ ● Implement (1:23)                   │  │ ✓ Review → ◆ Waiting    ││
