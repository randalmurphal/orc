      │  TASK-047 Update API docs                docs                Ready      │
      └─────────────────────────────────────────────────────────────────────────┘
      ```

      Sections:
      1. RUNNING - Active tasks with real-time progress
         - Task card: ID, title, current phase, elapsed time, progress bar
         - Progress bar shows phase completion
         - Status indicators: ● running, ✓ phase done, ◆ waiting

      2. NEEDS ATTENTION - Tasks requiring user action
