version: 1

# UX Simplification Initiative
# Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
#
# Relationship to INIT-036 (Workflow System Redesign):
# - WAITS FOR: Backend tasks (677-681, 685, 707, 711) that provide infrastructure
# - SUPERSEDES: UI tasks (696-706, 719) that will be reimplemented with new design
#
# All tasks reference the brainstorm document for design requirements.

create_initiative:
  title: "UX Simplification"
  vision: |
    Make orc intuitive - users should understand and use its power without
    fighting the UI. Workflow-centric model, gates as edges, never leave
    the editor, agent-first CLI, real-time collaboration.

    Core problem: "I built it and I don't understand it."

    Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md

decisions:
  - text: "Kill Agents and Environ from main nav"
    rationale: "Agents are implementation details. Config moves to phase inspector + Settings > Agents. Environ merges into Settings."

  - text: "Gates are edges, not node properties"
    rationale: "Mental model: phases are work (nodes), gates are transitions (edges). Matches how people think about workflows."

  - text: "Kill weight entirely - workflow-first task creation"
    rationale: "Weight was confusing indirection. Users pick workflows directly. Old weight→workflow mapping becomes smart defaults."

  - text: "CLI is agent-first - no interactive prompts by default"
    rationale: "CLI primary users are agents. Clear errors, JSON output, explicit flags. TUI (bubbletea) will be interactive human mode later."

  - text: "Two-level view: Board (attention) vs Task Detail (deep work)"
    rationale: "Board shows what needs focus. Task Detail is where you collaborate with the agent."

  - text: "Real-time feedback with timing options"
    rationale: "Send Now (pause agent), Send When Done (queue), Save for Later (manual). Users can steer agents mid-execution."

tasks:
  # ========================================
  # PHASE 1: NAVIGATION & SETTINGS
  # No backend dependencies - can start immediately
  # ========================================

  - id: 1
    title: "Kill Agents and Environ from main navigation"
    weight: small
    category: refactor
    priority: high
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Agreed Navigation Changes"

      Remove Agents and Environ from the main navigation bar.

      Current navigation:
        Board | Initiatives | Timeline | Stats | Workflows | Agents | Environ | Settings | Help

      New navigation:
        Board | Initiatives | Timeline | Stats | Workflows | Settings | Help

      Files to modify:
      - web/src/components/layout/MainLayout.tsx - Remove nav links
      - web/src/App.tsx - Remove routes (keep components for now, Settings will use them)

      DO NOT delete the Agents and Environ page components yet - they'll be moved
      to Settings in a separate task.

  - id: 2
    title: "Create Settings page with Agents and Environment tabs"
    weight: medium
    category: feature
    priority: high
    depends_on: [1]
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Agreed Navigation Changes"

      Create a new Settings page with tabbed navigation containing:
      - General (existing settings)
      - Agents (moved from /agents)
      - Environment (moved from /environ)

      The Settings page should be at /settings with sub-routes:
      - /settings (redirects to /settings/general)
      - /settings/general
      - /settings/agents
      - /settings/environment

      Reuse the existing AgentsPage and EnvironPage components as tab content.
      Use the project's existing tab component pattern (see SettingsPage for reference).

      After this task, the /agents and /environ routes can be removed from App.tsx.

