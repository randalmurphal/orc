  - id: 6
    title: "Implement gates as edges visual model"
    weight: large
    category: feature
    priority: critical
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Agreed: Gates as Transitions (Edge-Based Model)"
      Section: "Gate-Level Settings" table

      MAJOR PARADIGM SHIFT: Gates move from phase properties to edge properties.

      Visual design:
      - Lines flow from left canvas edge → through phases → to right canvas edge
      - No explicit Start/End nodes (ugly)
      - Gate symbols (◆) sit ON the edges between phases
      - Entry edge (before first phase) and exit edge (after last phase)

      Gate symbol visual states:
      | Visual | Color  | Meaning                    |
      |--------|--------|----------------------------|
      | ───    | Gray   | Passthrough (no gate)      |
      | ──○──  | Blue   | Auto (system checks)       |
      | ──◆──  | Yellow | Human approval required    |
      | ──◆──  | Purple | AI evaluates               |
      | ──◆──  | Red    | Blocked/failed             |
      | ──◆──  | Green  | Passed                     |

      Interaction:
      - Click gate symbol → Inspector shows gate config
      - Hover → Tooltip with config summary
      - Drag edge → Gate travels with the connection

      This requires:
      1. Custom edge component for React Flow
      2. Gate data on edges instead of nodes
      3. Inspector panel switching between phase/gate modes

      NOTE: Backend changes for gate-on-edge model may need coordination
      with INIT-036 backend tasks.

  - id: 7
    title: "Add gate inspector panel"
    weight: medium
    category: feature
    priority: high
    depends_on: [6]
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Gate-Level Settings" table

      When a gate (edge) is selected, the inspector shows gate configuration:

      APPROVAL:
      - Type: Auto / Human / AI / None (radio buttons or dropdown)

      AUTO CONFIG (when type=auto):
      - Criteria checkboxes: has_output, no_errors, completion_marker
      - Custom check pattern (text input)

      HUMAN CONFIG (when type=human):
      - Review prompt (textarea)

      AI CONFIG (when type=ai):
      - Reviewer agent (dropdown)
      - Context sources (multi-select: phase_outputs, task_details, vars)

      FAILURE HANDLING:
      - On Fail: retry / retry_from / fail / pause (dropdown)
      - Retry From (phase dropdown, visible when on_fail=retry_from)
      - Max Retries (number input)

      ADVANCED (collapsible):
      - Before Script (file path input)
      - After Script (file path input)
      - Store Result As (variable name input)

  - id: 8
    title: "Implement loop edges as backward connections"
    weight: medium
    category: feature
    priority: normal
    depends_on: [6]
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Loops Are Just Backward Edges"

      Loops are not special - they're just edges that go backward with their own gate.

      Visual representation:
      ```
      ══◆══╗        ╔══◆══╗        ╔══◆══
           ║        ║     ║        ║
      ┌────╨───┐ ┌──╨────┐ ┌──────╨┐
      │  Spec  │ │Implmnt│ │Review │
      └────────┘ └───────┘ └───────┘
                     ↑          │
                     └────◆─────┘
                       Loop gate
      ```

      Implementation:
      - Allow edge creation from later phase to earlier phase
      - Backward edges render with distinctive curve (below phases)
      - Gate on backward edge = loop condition
      - Same gate inspector for loop gates

      Remove separate "loop config" - it's now just a backward edge with a gate.

  - id: 9
    title: "Add variable tooltips on phase hover"
    weight: small
    category: feature
    priority: normal
    depends_on: [5]
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
