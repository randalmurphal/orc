      Visual phase progression matching the gate-as-edges design.

      Display:
      ```
      WORKFLOW PROGRESS
      ═══◆═══╗        ╔═══●═══╗        ╔═══○═══
              ║        ║       ║        ║
         ┌────╨───┐ ┌──╨──┐ ┌──╨────┐
         │ ✓ Spec │ │●Impl│ │○Review│
         └────────┘ └─────┘ └───────┘
      ```

      Status indicators:
      - ✓ = Completed (green)
      - ● = Active/running (blue, animated)
      - ○ = Pending (gray)
      - ✗ = Failed (red)
      - ◆ = Gate waiting (yellow)

      Gate symbols on edges match gate states.
      Click phase to jump to that phase's output in transcript.

  # ========================================
  # PHASE 6: REAL-TIME FEEDBACK SYSTEM
  # Pair programming with agent
  # ========================================

  - id: 20
    title: "Backend API for real-time feedback to agents"
    weight: medium
    category: feature
    priority: high
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Agreed: Real-Time Agent Collaboration"
      Section: "Backend Requirements"

      Add API endpoints for sending feedback to running agents.

      Data model:
      ```go
      type Feedback struct {
          ID       string    `json:"id"`
          TaskID   string    `json:"task_id"`
          Type     string    `json:"type"`     // inline, general, approval, direction
          File     string    `json:"file"`     // For inline comments
          Line     int       `json:"line"`     // For inline comments
          Text     string    `json:"text"`
          Timing   string    `json:"timing"`   // now, when_done, manual
          SentAt   time.Time `json:"sent_at"`
          Received bool      `json:"received"`
      }
      ```

      API endpoints:
      - POST /api/tasks/{id}/feedback - Add feedback item
      - GET /api/tasks/{id}/feedback - List pending feedback
      - POST /api/tasks/{id}/feedback/send - Send queued feedback
      - DELETE /api/tasks/{id}/feedback/{feedbackId} - Remove feedback

      Timing behavior:
      - "now": Pause agent, inject feedback, resume
      - "when_done": Queue, inject after current phase (before gate)
      - "manual": Store only, user triggers send explicitly

      Feedback injection: Add to agent context as user message on next prompt.

