  - id: 12
    title: "Update CLI task creation for workflow-first model"
    weight: small
    category: feature
    priority: high
    description: |
      Design doc: docs/plans/2026-02-01-ux-simplification-brainstorm.md
      Section: "Agreed: CLI is Agent-First"

      CLI is agent-first - no interactive prompts by default.

      Behavior:
      ```bash
      # Uses project default workflow - no prompts
      orc new "Fix auth bug"

      # Explicit workflow
      orc new "Fix auth bug" --workflow implement-small
      orc new "Fix auth bug" -W implement-small

      # Short alias for common workflows
      orc new "Fix auth bug" -w small  # Maps to implement-small

      # Error if no default and no flag (not a prompt!)
      $ orc new "Fix bug"
      Error: No default workflow configured.
      Use --workflow <id> or set defaults.workflow in .orc/config.yaml

      # List workflows
      $ orc workflows
      ID                NAME                  PHASES  DEFAULT
      implement-small   Implement (Small)     3       ★
      implement-medium  Implement (Medium)    5
      ...
      ```

      Changes needed:
      - Add --workflow/-W flag to `orc new`
      - Add -w shorthand that maps to common workflows
      - Error with clear message if no default and no --workflow
      - Add `orc workflows` command to list available
      - Update help text extensively

      NOTE: Weight is NOT removed yet for backward compatibility.
      Task creation accepts either --workflow or --weight (weight maps to workflow).

