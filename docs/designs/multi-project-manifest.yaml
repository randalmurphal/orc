  # ============================================================================
  # PHASE 6: Init & Hosting Improvements
  # ============================================================================

  - id: 13
    title: "Add hosting detection and token validation to orc init"
    weight: medium
    category: feature
    priority: normal
    description: |
      Move hosting provider detection from PR-time to init-time. Validate
      tokens exist and work.

      **Current problem:** Hosting detection happens lazily during PR creation.
      Self-hosted GitLab users get cryptic errors on first `orc run`.

      **Add to init wizard:**
      1. Detect git remote: `git remote get-url origin`
      2. Pattern match for GitHub/GitLab
      3. Prompt for confirmation: "Detected GitHub, correct? [Y/n]"
      4. Store in .orc/config.yaml: `hosting.provider: github`
      5. Check for token: GITHUB_TOKEN or GITLAB_TOKEN
      6. Validate token works (fetch current user)

      **Verification output:**
      ```
      ✓ Git repository detected
      ✓ Remote 'origin' found: github.com/randalmurphal/orc
      ✓ Hosting provider: GitHub
      ✓ GITHUB_TOKEN found
      ✓ Token validated (user: randalmurphal)
      ✗ ANTHROPIC_API_KEY not set (required for orc run)
      ```

      **Add auto-merge warning for GitHub:**
      If config has `completion.pr.auto_merge: true` and provider is GitHub,
      warn during init and during `orc run`:
      ```
      Warning: auto_merge is enabled but not supported on GitHub (requires GraphQL)
      Consider using completion.ci.merge_on_ci_pass instead
      ```

      Files to modify:
      - internal/bootstrap/bootstrap.go (add hosting detection step)
      - internal/bootstrap/wizard.go (hosting confirmation prompt)
      - internal/hosting/detect.go (token validation)
      - internal/cli/cmd_init.go (verification output)
      - internal/executor/workflow_executor.go (auto-merge warning)
