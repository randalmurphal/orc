id: implement-large
name: "Implement (Large)"
description: "Full implementation workflow: spec, TDD, integration tests, breakdown, implement, review, docs"

phases:
  - template: spec
    sequence: 0

  - template: tdd_write
    sequence: 1
    depends_on: ["spec"]

  - template: tdd_integrate
    sequence: 2
    depends_on: ["tdd_write"]

  - template: breakdown
    sequence: 3
    depends_on: ["tdd_integrate"]

  - template: implement
    sequence: 4
    depends_on: ["breakdown"]

  - template: review
    sequence: 5
    depends_on: ["implement"]
    loop_config:
      loop_to_phase: implement
      condition:
        field: "phase_output.review.status"
        op: "eq"
        value: "needs_changes"
      max_loops: 3
      loop_templates:
        "1": "review.md"
        default: "review_round2.md"
      loop_schemas:
        "1": "ReviewFindingsSchema"
        default: "ReviewDecisionSchema"

  - template: docs
    sequence: 6
    depends_on: ["review"]

triggers:
  - event: on_initiative_planned
    agent_id: dependency-validator
    mode: gate
    enabled: true
