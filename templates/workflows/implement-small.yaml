id: implement-small
name: "Implement (Small)"
description: "Lightweight workflow: tiny_spec, implement, review, docs"

phases:
  - template: tiny_spec
    sequence: 0

  - template: implement
    sequence: 1
    depends_on: ["tiny_spec"]

  - template: review
    sequence: 2
    depends_on: ["implement"]
    loop_config:
      loop_to_phase: implement
      condition:
        field: "phase_output.review.status"
        op: "eq"
        value: "needs_changes"
      max_loops: 3
      loop_templates:
        "1": "review.md"
        default: "review_round2.md"
      loop_schemas:
        "1": "ReviewFindingsSchema"
        default: "ReviewDecisionSchema"

  - template: docs
    sequence: 3
    depends_on: ["review"]
