id: crossmodel-standard
name: "Cross-Model Standard"
description: "Strict default path: Opus plans, GPT 5.4 implements (including browser validation when needed), Opus reviews, GPT 5.4 cross-checks, then targeted docs."

# Model strategy:
#   plan         → Opus (ambiguity handling, risk classification, codebase exploration)
#   implement    → GPT 5.4 via Codex (single-owner implementation + tests)
#   review       → Opus (primary independent review)
#   review_cross → GPT 5.4 via Codex (second independent review)
#   implement    → includes browser validation when implemented behavior requires it
#   docs         → GPT 5.4 via Codex (targeted operational docs updates or explicit no-op)

phases:
  - template: plan
    sequence: 0
    model_override: opus

  - template: implement_codex
    sequence: 1
    depends_on: ["plan"]
    model_override: gpt-5.4

  - template: review
    sequence: 2
    depends_on: ["implement_codex"]
    model_override: opus
    loop_config:
      loop_to_phase: implement_codex
      condition:
        field: "phase_output.review.needs_changes"
        op: "eq"
        value: "true"
      max_loops: 2
      loop_templates:
        "1": "prompts/review.md"
        default: "prompts/review_round2.md"
      loop_schemas:
        "1": "ReviewFindingsSchema"
        default: "ReviewDecisionSchema"

  - template: review_cross
    sequence: 3
    depends_on: ["review"]
    provider_override: codex
    model_override: gpt-5.4
    loop_config:
      loop_to_phase: implement_codex
      condition:
        field: "phase_output.review_cross.needs_changes"
        op: "eq"
        value: "true"
      max_loops: 2

  - template: docs
    sequence: 4
    depends_on: ["review_cross"]
    provider_override: codex
    model_override: gpt-5.4

triggers:
  - event: on_initiative_planned
    agent_id: dependency-validator
    mode: gate
    enabled: true
