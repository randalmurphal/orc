id: implement-medium
name: "Implement (Medium)"
description: "Standard implementation workflow: spec, TDD, integration tests, implement, review, docs"

phases:
  - template: spec
    sequence: 0

  - template: tdd_write
    sequence: 1
    depends_on: ["spec"]

  - template: tdd_integrate
    sequence: 2
    depends_on: ["tdd_write"]

  - template: implement
    sequence: 3
    depends_on: ["tdd_integrate"]

  - template: review
    sequence: 4
    depends_on: ["implement"]
    loop_config:
      loop_to_phase: implement
      condition:
        field: "phase_output.review.needs_changes"
        op: "eq"
        value: "true"
      max_loops: 3
      loop_templates:
        "1": "prompts/review.md"
        default: "prompts/review_round2.md"
      loop_schemas:
        "1": "ReviewFindingsSchema"
        default: "ReviewDecisionSchema"

  - template: docs
    sequence: 5
    depends_on: ["review"]

triggers:
  - event: on_initiative_planned
    agent_id: dependency-validator
    mode: gate
    enabled: true
