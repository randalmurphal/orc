id: implement-standard
name: "Implement (Standard)"
description: "Lean planning, implementation, single-model review. Lighter than medium, better than small."

phases:
  - template: plan
    sequence: 0

  - template: implement
    sequence: 1
    depends_on: ["plan"]

  - template: review
    sequence: 2
    depends_on: ["implement"]
    loop_config:
      loop_to_phase: implement
      condition:
        field: "phase_output.review.needs_changes"
        op: "eq"
        value: "true"
      max_loops: 3
      loop_templates:
        "1": "prompts/review.md"
        default: "prompts/review_round2.md"
      loop_schemas:
        "1": "ReviewFindingsSchema"
        default: "ReviewDecisionSchema"

  - template: docs
    sequence: 3
    depends_on: ["review"]

triggers:
  - event: on_initiative_planned
    agent_id: dependency-validator
    mode: gate
    enabled: true
