id: codex-medium
name: Codex Medium
description: 'Mixed provider workflow: Claude Opus for spec/TDD, Codex GPT-5.3 for implement/review'
phases:
    - template: spec
      sequence: 0
      provider_override: claude
      model_override: opus
    - template: tdd_write
      sequence: 1
      depends_on:
        - spec
      provider_override: claude
      model_override: opus
    - template: tdd_integrate
      sequence: 2
      depends_on:
        - tdd_write
      provider_override: claude
      model_override: opus
    - template: implement
      sequence: 3
      depends_on:
        - tdd_integrate
      provider_override: codex
      model_override: gpt-5.3-codex
    - template: review
      sequence: 4
      depends_on:
        - implement
      provider_override: codex
      model_override: gpt-5.3-codex
    - template: docs
      sequence: 5
      depends_on:
        - review
      provider_override: codex
      model_override: gpt-5.3-codex
